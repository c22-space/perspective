name: CI

on:
  push:
    branches: [main, implementation]
  pull_request:
    branches: [main, implementation]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  build-python:
    name: Build Python bindings
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install maturin
      - name: Build perspective-python
        working-directory: crates/perspective-python
        run: maturin develop
      - name: Smoke test
        run: |
          python3 -c "
          from perspective_python import PerspectiveEngine, MemoryResult
          import tempfile, os
          d = tempfile.mkdtemp()
          e = PerspectiveEngine(d)
          assert e.health(), 'health check failed'
          id1 = e.store('test', 'hello world', 'episodic')
          assert id1, 'store returned empty id'
          results = e.recall('test', 'hello', budget=5)
          assert len(results) > 0, 'recall returned no results'
          assert results[0].content == 'hello world', f'wrong content: {results[0].content}'
          e.delete('test', id1)
          print('All smoke tests passed')
          "
