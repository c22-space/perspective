name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: perspective-linux-amd64
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact: perspective-linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: perspective-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: perspective-macos-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: perspective-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev cmake pkg-config

      - name: Build dashboard
        run: cd dashboard && npm ci && npm run build

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p perspective-cli

      - name: Rename binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/perspective ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/perspective.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            perspective-linux-amd64
            perspective-linux-arm64
            perspective-macos-arm64
            perspective-macos-amd64
            perspective-windows-amd64.exe
